# Praxis POC Policy - External Network Mode
# This policy delegates network enforcement to an external proxy (Praxis)

version: 1

# Minimal filesystem access for testing
filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null

# External network mode - delegates to Praxis
network:
  mode: external
  external:
    proxy_type: praxis
    control_endpoint: "http://localhost:8080"

# Process settings
process:
  run_as_user: sandbox
  run_as_group: sandbox

# Landlock (best effort for compatibility)
landlock:
  compatibility: best_effort
